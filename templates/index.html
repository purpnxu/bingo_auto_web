<!DOCTYPE html>
<html>
<head>
    <title>Bingo 統計查詢</title>
</head>
<body>
    <h1>Bingo 統計查詢</h1>
    <form method="post">
        日期: <input type="date" name="date" value="{{ selected_date }}">
        類別:
        <select name="category">
            {% for cat in categories %}
            <option value="{{ cat }}" {% if selected_category==cat %}selected{% endif %}>{{ cat }}</option>
            {% endfor %}
        </select>
        <input type="submit" value="查詢">
    </form>
    {% if results %}
        <table border="1">
            <tr>
                <th>日期</th>
                <th>期數</th>
                <th>類別</th>
                <th>組合號碼</th>
                <th>出現次數</th>
                <th>建立時間</th>
            </tr>
            {% for row in results %}
            <tr>
                <td>{{ row.date }}</td>
                <td>{{ row.period }}</td>
                <td>{{ row.category }}</td>
                <td>{{ row.combination }}</td>
                <td>{{ row.count }}</td>
                <td>{{ row.created_at }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>查無資料</p>
    {% endif %}
</body>
</html>
